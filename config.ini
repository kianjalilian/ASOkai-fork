[DEFAULT]
; Species (homo_sapiens, mus_musculus)
Species = homo_sapiens
; Target gene ID
TargetGene = ENSG00000133703
; Length of candidate oligos
OligoLen = 16
; GC-content bound for candidate oligos
GCbound = 0.2,0.8
; Genome Assembly
GenomeAssembly = 38
; Ensemble Release
EnsembleRelease = 113

; Layout of kmer containing left_flank,core_region,right_flank
MultiplicityLayout = 4,8,4

; maximum ddG from main target site for a repeated site to be included
MaxddG = 3.0
ddGTolerance = 1.0
; Number of Consecutive matches needed for RNas-h to cleave RNA
ConsecutiveMatchesCoreRegion = 5

; Directory for genomic data
GenomeDir = ./data
; Directory for Bowtie2 data
Bowtie2Dir = ./data
; Directory for all other data (i.e. oligos, results, etc.)
DataDir = ./data

; Bowtie2 Arguments, refer to: https://bowtie-bio.sourceforge.net/bowtie2/manual.shtml
BowtieArgs = --no-head -t -p 64 -N 0 -a -f --norc --score-min L,0,0
BowtieBuildIndexArgs= --threads 64 -q

; Transcriptome support levels for bowtie index (can be a combination of tsl1,tsl2,tsl3,tsl4,tsl5,tslNA), refer to: https://www.ensembl.org/info/genome/genebuild/transcript_quality_tags.html. 
; Including all transcript support levels will increase the space required.
transcriptSupportLevels = tsl1,tsl2

; viennaRNA parameter file
CofoldParamFile=./vienna_rna_rna_params.par




; Add your own configuration below, 
; Any configuration below this line will override the default configuration if you run the script with the argument --args MY_CONFIG. 
; Example: python3 main.py --args MY_CONFIG
[MY_CONFIG]